<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Preventivatore Notarile PWA</title>
    <style>
        /* GRAFICA DELL'APP */
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: #333; }
        .app-container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #2c3e50; margin: 0; }
        h2 { font-size: 1rem; color: #7f8c8d; margin: 5px 0 0 0; }
        h3 { color: #2980b9; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        label { font-weight: bold; font-size: 0.9rem; color: #2c3e50; display: block; margin-top: 10px; }
        select, input[type="text"] { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #bdc3c7; border-radius: 6px; font-size: 1rem; box-sizing: border-box; background: #fdfdfd; }
        select:focus, input[type="text"]:focus { border-color: #3498db; outline: none; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        
        button { background: #3498db; color: white; border: none; padding: 12px 15px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 15px; }
        button:hover { background: #2980b9; }
        button.secondary { background: #95a5a6; }
        button.secondary:hover { background: #7f8c8d; }
        button.danger { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 0.8rem; float: right; margin-top: 0; }
        
        .toggle-container { background: #e8f4f8; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #d6eaf8; }
        .toggle-container label { display: inline; margin-left: 10px; font-size: 1rem; cursor: pointer; }
        
        .tooltip { cursor: help; background: #f39c12; color: #fff; padding: 2px 6px; border-radius: 50%; font-size: 0.8rem; margin-left: 5px; }
        .blocco-immobile { border: 2px solid #ecf0f1; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 8px; }
        .blocco-terreno { border: 2px solid #27ae60; padding: 15px; margin-bottom: 15px; background: #eafaf1; border-radius: 8px; }
        
        /* Navigazione */
        .wizard-step { display: none; }
        #step1 { display: block; }
        .flex-buttons { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>NUOVO PREVENTIVO</h1>
        <h2>Calcolo Imposte e Competenze</h2>
    </header>

    <section id="step1" class="wizard-step">
        <h3>Fase 1: Impostazioni della Pratica</h3>
        
        <label>Tipologia Venditore / Regime Fiscale:</label>
        <select id="regimeFiscale">
            <option value="registro">1. Privato o Società non costruttrice (Imposta di Registro)</option>
            <option value="iva_agevolata">2. Impresa Costruttrice - Entro 5 anni (Soggetta ad IVA)</option>
            <option value="registro">3. Impresa Cost. - Oltre 5 anni SENZA opzione (Registro)</option>
            <option value="iva_agevolata">4. Impresa Cost. - Oltre 5 anni CON opzione (Soggetta ad IVA)</option>
        </select>
        <div style="font-size: 0.8rem; color: #666; margin-top: 5px;">Scegliendo IVA, verranno applicate imposte fisse, bollo e trascrizione maggiorati.</div>

        <div class="toggle-container">
            <input type="checkbox" id="condizioneSospensiva">
            <label for="condizioneSospensiva">Atto sottoposto a Condizione Sospensiva</label>
            <span class="tooltip" title="Ai sensi dell'Art. 27 DPR 131/86: applica imposta di registro fissa 200€, bollo 155€ e formalità 235€ (tra privati).">i</span>
        </div>

        <button type="button" onclick="vaiAlloStep(2)">Avanti ➔</button>
    </section>

    <section id="step2" class="wizard-step">
        <h3>Fase 2: Composizione Atto</h3>
        
        <div id="contenitoreImmobili"></div>

        <div class="flex-buttons" style="margin-top: 0;">
            <button type="button" class="secondary" onclick="aggiungiImmobile()" style="background: #34495e;">+ Aggiungi Casa/Pertinenza</button>
            <button type="button" class="secondary" onclick="aggiungiTerreno()" style="background: #27ae60;">+ Aggiungi Terreno</button>
        </div>

        <div style="border-top: 2px solid #ecf0f1; margin-top: 20px; padding-top: 15px;">
            <label>Spese vive accessorie (Visure, APE, ecc.):</label>
            <div id="contenitoreSpeseExtra">
                <div class="riga-spesa" style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" class="nome-spesa" value="Spese Visure e Ispezioni" style="flex: 2;">
                    <input type="text" class="importo-spesa input-valuta" value="100,00" style="flex: 1;" oninput="formattaValuta(this)">
                </div>
            </div>
            <button type="button" class="secondary" onclick="aggiungiSpesaExtra()" style="padding: 8px; font-size: 0.9rem;">+ Aggiungi altra spesa</button>
        </div>

        <div class="flex-buttons">
            <button type="button" class="secondary" onclick="vaiAlloStep(1)">⬅ Indietro</button>
            <button type="button" onclick="avviaCalcoloPreventivo()">Calcola Preventivo ➔</button>
        </div>
    </section>

    <section id="step3" class="wizard-step">
        <div id="risultatoPreventivo"></div>
        
        <div class="flex-buttons">
            <button type="button" class="secondary" onclick="vaiAlloStep(2)">⬅ Modifica Dati</button>
            <button type="button" onclick="window.print()">Stampa PDF</button>
        </div>
    </section>
</div>

<script>
    // --- DATABASE STATALE ONORARI REPERTORIO ---
    const PUB = [
        {max: 37000, h:{"100%":275, "70%":193, "50%":138, "25%":69}, c:0.22},
        {max: 55800, h:{"100%":320, "70%":224, "50%":160, "25%":80}, c:0.42},
        {max: 74400, h:{"100%":354, "70%":248, "50%":177, "25%":89}, c:0.42},
        {max: 93000, h:{"100%":400, "70%":280, "50%":200, "25%":100}, c:0.42},
        {max: 139500, h:{"100%":434, "70%":304, "50%":217, "25%":109}, c:0.42},
        {max: 186000, h:{"100%":480, "70%":336, "50%":240, "25%":120}, c:0.42},
        {max: 232400, h:{"100%":514, "70%":360, "50%":257, "25%":129}, c:0.42},
        {max: 280000, h:{"100%":560, "70%":392, "50%":280, "25%":140}, c:0.42},
        {max: 370000, h:{"100%":594, "70%":416, "50%":297, "25%":149}, c:0.42},
        {max: 465000, h:{"100%":674, "70%":472, "50%":337, "25%":169}, c:0.42},
        {max: 695000, h:{"100%":754, "70%":528, "50%":377, "25%":189}, c:0.42},
        {max: 930000, h:{"100%": 879, "70%":615, "50%":440, "25%":220}, c:0.42},
        {max: 1162000, h:{"100%":948, "70%":664, "50%":474, "25%":237}, c:0.42},
        {max: 1395000, h:{"100%":1028, "70%":720, "50%":514, "25%":257}, c:0.42},
        {max: 1625000, h:{"100%":1074, "70%":752, "50%":537, "25%":269}, c:0.42},
        {max: 1860000, h:{"100%":1108, "70%":776, "50%":554, "25%":277}, c:0.42},
        {max: 2325000, h:{"100%":1154, "70%":808, "50%":577, "25%":289}, c:0.42},
        {max: 2790000, h:{"100%":1188, "70%":832, "50%":594, "25%":297}, c:0.42},
        {max: 3255000, h:{"100%":1235, "70%":865, "50%":618, "25%":309}, c:0.42},
        {max: 3720000, h:{"100%":1268, "70%":888, "50%":634, "25%":317}, c:0.42},
        {max: 4185000, h:{"100%":1314, "70%":920, "50%":657, "25%": 329}, c:0.42},
        {max: 4650000, h:{"100%":1348, "70%":944, "50%":674, "25%":337}, c:0.42},
        {max: Infinity, h:{"100%":1394, "70%":976, "50%":697, "25%":349}, c:0.42}
    ];

    const fmt = new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' });

    // --- FUNZIONI DI BASE ---
    function vaiAlloStep(numeroStep) {
        const steps = document.querySelectorAll('.wizard-step');
        for (let i = 0; i < steps.length; i++) {
            steps[i].style.display = 'none';
        }
        document.getElementById('step' + numeroStep).style.display = 'block';
    }

    function formattaValuta(inputElement) {
        let v = inputElement.value.replace(/[^\d,]/g, ""); 
        let pts = v.split(",");
        pts[0] = pts[0].replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
        inputElement.value = pts.join(",");
    }

    // --- FUNZIONI DI AVVISO ---
    function lanciaAvvisoPertinenzaLusso() {
        alert("⚠️ AVVISO CONSAPEVOLEZZA:\nHai selezionato un'agevolazione per una pertinenza, ma nell'atto è presente un immobile di lusso (A/1).\n\nRicorda: la pertinenza NON può essere agevolata se è al servizio dell'A/1. Può esserlo SOLO se la stai acquistando come pertinenza di un'ALTRA abitazione (Prima Casa) che il cliente possiede già.\n\nSe è questo il caso, procedi pure.");
    }

    function bloccaLusso(selectElement) {
        const blocco = selectElement.parentElement;
        const checkboxAgevolazione = blocco.querySelector('.check-agevolazione');
        
        if (selectElement.value === 'A1') {
            checkboxAgevolazione.checked = false;
            checkboxAgevolazione.disabled = true;
            
            let pertinenzeAttive = false;
            const tuttiBlocchi = document.querySelectorAll('.blocco-immobile');
            for (let i = 0; i < tuttiBlocchi.length; i++) {
                if (tuttiBlocchi[i] === blocco) continue;
                const c = tuttiBlocchi[i].querySelector('.cat-catastale').value;
                const a = tuttiBlocchi[i].querySelector('.check-agevolazione').checked;
                if (a && (c === 'C2' || c === 'C6' || c === 'C7')) pertinenzeAttive = true;
            }
            if (pertinenzeAttive) lanciaAvvisoPertinenzaLusso();
        } else {
            checkboxAgevolazione.disabled = false;
        }
    }

    function controllaSpuntaPertinenza(checkbox) {
        if (!checkbox.checked) return;
        const blocco = checkbox.closest('.blocco-immobile');
        const categoria = blocco.querySelector('.cat-catastale').value;
        const isPertinenza = (categoria === 'C2' || categoria === 'C6' || categoria === 'C7');
        
        if (isPertinenza) {
            let haLusso = false;
            const selectors = document.querySelectorAll('.cat-catastale');
            for (let i = 0; i < selectors.length; i++) {
                if (selectors[i].value === 'A1') haLusso = true;
            }
            if (haLusso) lanciaAvvisoPertinenzaLusso();
        }
    }

    // --- GESTIONE DINAMICA CAMPI ---
    let contatoreImmobili = 0;
    
    function aggiungiImmobile() {
        contatoreImmobili++;
        const contenitore = document.getElementById('contenitoreImmobili');
        const blocco = document.createElement('div');
        blocco.className = 'blocco-immobile';
        
        blocco.innerHTML = `
            <h4 style="margin-top: 0; color: #2c3e50;">Immobile/Pertinenza #${contatoreImmobili} 
                <button type="button" class="danger" onclick="this.parentElement.parentElement.remove()">X Rimuovi</button>
            </h4>
            
            <label>Categoria Catastale:</label>
            <select class="cat-catastale" onchange="bloccaLusso(this)">
                <optgroup label="Abitativi">
                    <option value="A2">A/2 - Abitazione di tipo civile</option>
                    <option value="A3">A/3 - Abitazione di tipo economico</option>
                    <option value="A1">A/1 - Abitazione di tipo signorile (Lusso)</option>
                </optgroup>
                <optgroup label="Pertinenze">
                    <option value="C2">C/2 - Cantina / Magazzino</option>
                    <option value="C6">C/6 - Garage / Box Auto</option>
                    <option value="C7">C/7 - Tettoia</option>
                </optgroup>
            </select>

            <div class="toggle-container" style="padding: 10px; margin-top: 5px;">
                <input type="checkbox" id="agevolazione_${contatoreImmobili}" class="check-agevolazione" onchange="controllaSpuntaPertinenza(this)">
                <label for="agevolazione_${contatoreImmobili}" style="font-weight: bold; color: #2980b9;">Richiesta Agevolazione Prima Casa</label>
            </div>

            <label>Rendita Catastale (€):</label>
            <input type="text" class="input-valuta rendita-catastale" placeholder="es. 500,00" oninput="formattaValuta(this)">

            <label>Prezzo Dichiarato in Atto (€):</label>
            <input type="text" class="input-valuta prezzo-dichiarato" placeholder="es. 150.000" oninput="formattaValuta(this)">
        `;
        contenitore.appendChild(blocco);
    }

    // NUOVA FUNZIONE PER I TERRENI
    let contatoreTerreni = 0;
    
    function aggiungiTerreno() {
        contatoreTerreni++;
        const contenitore = document.getElementById('contenitoreImmobili');
        const blocco = document.createElement('div');
        blocco.className = 'blocco-terreno';
        
        blocco.innerHTML = `
            <h4 style="margin-top: 0; color: #27ae60;">Terreno #${contatoreTerreni} 
                <button type="button" class="danger" onclick="this.parentElement.parentElement.remove()">X Rimuovi</button>
            </h4>
            
            <label>Tipologia e Regime Fiscale del Terreno:</label>
            <select class="tipo-terreno">
                <option value="agricolo_ord">Agricolo Ordinario (Imposta Registro 15%)</option>
                <option value="agricolo_ppc">Agricolo Agevolato PPC/IAP (Imposta Catastale 1%)</option>
                <option value="edificabile_privato">Edificabile venduto da Privato (Imposta Registro 9%)</option>
                <option value="edificabile_iva">Edificabile venduto da Impresa (Soggetto IVA 22%)</option>
            </select>

            <label>Prezzo Dichiarato in Atto / Valore (€):</label>
            <input type="text" class="input-valuta prezzo-terreno" placeholder="es. 50.000" oninput="formattaValuta(this)">
        `;
        contenitore.appendChild(blocco);
    }

    function aggiungiSpesaExtra() {
        const contenitore = document.getElementById('contenitoreSpeseExtra');
        const riga = document.createElement('div');
        riga.className = 'riga-spesa';
        riga.style = "display: flex; gap: 10px; margin-bottom: 10px;";
        riga.innerHTML = `
            <input type="text" class="nome-spesa" placeholder="Descrizione spesa" style="flex: 2;">
            <input type="text" class="importo-spesa input-valuta" placeholder="0,00" style="flex: 1;" oninput="formattaValuta(this)">
            <button type="button" class="danger" onclick="this.parentElement.remove()" style="margin-top: 5px;">X</button>
        `;
        contenitore.appendChild(riga);
    }

    // --- CONTROLLO ERRORI E AVVIO CALCOLO ---
    function avviaCalcoloPreventivo() {
        const regimeFiscale = document.getElementById('regimeFiscale').value;
        const isCondizionata = document.getElementById('condizioneSospensiva').checked;
        const blocchiImmobili = document.querySelectorAll('.blocco-immobile');
        const blocchiTerreni = document.querySelectorAll('.blocco-terreno');
        
        if (blocchiImmobili.length === 0 && blocchiTerreni.length === 0) {
            alert("ATTENZIONE: Devi inserire almeno un immobile o un terreno per calcolare il preventivo.");
            return;
        }

        let conteggioPertinenze = { 'C2': 0, 'C6': 0, 'C7': 0 };
        let erroreDoppiaPertinenza = false;

        for (let i = 0; i < blocchiImmobili.length; i++) {
            const blocco = blocchiImmobili[i];
            const categoria = blocco.querySelector('.cat-catastale').value;
            const isAgevolata = blocco.querySelector('.check-agevolazione').checked;
            
            if (isAgevolata && (categoria === 'C2' || categoria === 'C6' || categoria === 'C7')) {
                conteggioPertinenze[categoria]++;
                if (conteggioPertinenze[categoria] > 1) erroreDoppiaPertinenza = true;
            }
        }

        if (erroreDoppiaPertinenza) {
            alert("ERRORE FISCALE: Hai richiesto l'agevolazione Prima Casa su più di una pertinenza della stessa categoria (es. due garage). La legge lo vieta. Rimuovi la spunta per procedere.");
            return; 
        }

        vaiAlloStep(3);
        eseguiMatematicaTasse(regimeFiscale, isCondizionata, blocchiImmobili, blocchiTerreni);
    }

    // --- MOTORE MATEMATICO ---
    function eseguiMatematicaTasse(regimeFiscale, isCondizionata, blocchiImmobili, blocchiTerreni) {
        let totalePrezzo = 0;
        let totaleRegistroProporzionale = 0;
        let totaleCatastalePPC = 0; 
        let haPrimaCasa = false; 
        let riepilogoHTML = "";
        let totaleIvaVenditore = 0;

        // FASE 1: CALCOLO IMMOBILI E PERTINENZE
        for (let i = 0; i < blocchiImmobili.length; i++) {
            const blocco = blocchiImmobili[i];
            const num = i + 1;
            const categoria = blocco.querySelector('.cat-catastale').value;
            const isAgevolata = blocco.querySelector('.check-agevolazione').checked;
            
            const rendita = parseFloat(blocco.querySelector('.rendita-catastale').value.replace(/\./g, "").replace(",", ".")) || 0;
            const prezzo = parseFloat(blocco.querySelector('.prezzo-dichiarato').value.replace(/\./g, "").replace(",", ".")) || 0;
            
            totalePrezzo += prezzo;

            if (regimeFiscale === 'registro') {
                let moltiplicatore = isAgevolata ? 115.5 : 126;
                let aliquota = isAgevolata ? 0.02 : 0.09;
                if (isAgevolata) haPrimaCasa = true;

                let valoreCatastale = rendita * moltiplicatore;
                let impostaSingola = valoreCatastale * aliquota;
                totaleRegistroProporzionale += impostaSingola;

                riepilogoHTML += `<div style="font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dashed #ccc;">
                    <strong>Fabbricato #${num} (${categoria})</strong> - Base imponibile: ${fmt.format(valoreCatastale)} <br>
                    <span style="color: #7f8c8d;">(Rendita ${fmt.format(rendita)} x ${moltiplicatore}) -> Imposta ${isAgevolata ? '2%' : '9%'} pari a <strong>${fmt.format(impostaSingola)}</strong></span>
                </div>`;
            } else {
                let aliquotaIva = isAgevolata ? 0.04 : 0.10; 
                if (categoria === 'A1') aliquotaIva = 0.22;
                
                if (isAgevolata) haPrimaCasa = true;
                let ivaSingola = prezzo * aliquotaIva;
                totaleIvaVenditore += ivaSingola;

                riepilogoHTML += `<div style="font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dashed #ccc;">
                    <strong>Fabbricato #${num} (${categoria})</strong> - Prezzo: ${fmt.format(prezzo)} <br>
                    <span style="color: #e74c3c; font-weight:bold;">(IVA al ${aliquotaIva * 100}%: ${fmt.format(ivaSingola)} - DA PAGARE AL VENDITORE)</span>
                </div>`;
            }
        }

        // FASE 2: CALCOLO TERRENI
        for (let i = 0; i < blocchiTerreni.length; i++) {
            const blocco = blocchiTerreni[i];
            const num = i + 1;
            const selectTipo = blocco.querySelector('.tipo-terreno');
            const tipoValore = selectTipo.value;
            const nomeTerreno = selectTipo.options[selectTipo.selectedIndex].text.split("(")[0].trim();
            const prezzo = parseFloat(blocco.querySelector('.prezzo-terreno').value.replace(/\./g, "").replace(",", ".")) || 0;
            
            totalePrezzo += prezzo;

            if (tipoValore === 'agricolo_ord') {
                let impostaSingola = prezzo * 0.15;
                totaleRegistroProporzionale += impostaSingola;
                riepilogoHTML += `<div style="font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dashed #ccc;">
                    <strong style="color: #27ae60;">Terreno #${num} (${nomeTerreno})</strong> - Prezzo: ${fmt.format(prezzo)} <br>
                    <span style="color: #7f8c8d;">Calcolo Imposta Registro 15% pari a <strong>${fmt.format(impostaSingola)}</strong></span>
                </div>`;
            } else if (tipoValore === 'agricolo_ppc') {
                let impostaSingola = prezzo * 0.01;
                totaleCatastalePPC += impostaSingola; // Aggiunge all'imposta catastale finale
                riepilogoHTML += `<div style="font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dashed #ccc;">
                    <strong style="color: #27ae60;">Terreno #${num} (${nomeTerreno})</strong> - Prezzo: ${fmt.format(prezzo)} <br>
                    <span style="color: #7f8c8d;">Calcolo Imposta Catastale 1% pari a <strong>${fmt.format(impostaSingola)}</strong></span>
                </div>`;
            } else if (tipoValore === 'edificabile_privato') {
                let impostaSingola = prezzo * 0.09;
                totaleRegistroProporzionale += impostaSingola;
                riepilogoHTML += `<div style="font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dashed #ccc;">
                    <strong style="color: #27ae60;">Terreno #${num} (${nomeTerreno})</strong> - Prezzo: ${fmt.format(prezzo)} <br>
                    <span style="color: #7f8c8d;">Calcolo Imposta Registro 9% pari a <strong>${fmt.format(impostaSingola)}</strong></span>
                </div>`;
            } else if (tipoValore === 'edificabile_iva') {
                let ivaSingola = prezzo * 0.22;
                totaleIvaVenditore += ivaSingola;
                riepilogoHTML += `<div style="font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dashed #ccc;">
                    <strong style="color: #27ae60;">Terreno #${num} (${nomeTerreno})</strong> - Prezzo: ${fmt.format(prezzo)} <br>
                    <span style="color: #e74c3c; font-weight:bold;">(IVA al 22%: ${fmt.format(ivaSingola)} - DA PAGARE AL VENDITORE)</span>
                </div>`;
            }
        }

        // FASE 3: IMPOSTE DI ATTO ASSORBITE O FISSE
        let impostaRegistro = 0, impostaIpotecaria = 0, impostaCatastale = 0, impostaBollo = 0, tassaTrascrizione = 0;

        if (isCondizionata && regimeFiscale === 'registro') {
            impostaRegistro = 200; impostaBollo = 155; tassaTrascrizione = 235;
        } else if (regimeFiscale === 'registro') {
            // Il controllo del minimo di 1.000 euro si fa sulla somma di case (2/9%) e terreni (15/9%)
            impostaRegistro = totaleRegistroProporzionale < 1000 ? 1000 : totaleRegistroProporzionale;
            impostaIpotecaria = 50; 
            impostaCatastale = 50;
            // Se c'è un terreno PPC, aggiungo il suo 1% proporzionale alla base fissa di 50 euro
            if (totaleCatastalePPC > 0) {
                impostaCatastale = 50 + totaleCatastalePPC;
                // Nota legale: se l'atto ha SOLO un terreno PPC, registro e ipotecaria salgono a 200.
                if (blocchiImmobili.length === 0 && totaleRegistroProporzionale === 0) {
                    impostaRegistro = 200;
                    impostaIpotecaria = 200;
                    impostaCatastale = totaleCatastalePPC; // Per il PPC puro la fissa catastale non c'è, c'è solo l'1%
                }
            }
        } else if (regimeFiscale === 'iva_agevolata') {
            impostaRegistro = 200; impostaIpotecaria = 200; impostaCatastale = 200;
            impostaBollo = 230; tassaTrascrizione = 90;
        }

        // FASE 4: SPESE EXTRA
        let totaleSpeseExtra = 0;
        let speseExtraHTML = `<tr style="border-top: 2px solid #ccc; background-color: #f9f9f9;"><td colspan="2" style="padding: 8px 5px; font-weight: bold; font-size: 1.05rem; color: #2c3e50;">Spese Accessorie Esenti</td></tr>`;
        
        const righeSpese = document.querySelectorAll('.riga-spesa');
        for (let i = 0; i < righeSpese.length; i++) {
            const nomeSpesa = righeSpese[i].querySelector('.nome-spesa').value || "Spesa accessoria";
            const importoInput = righeSpese[i].querySelector('.importo-spesa').value;
            const importoSpesa = parseFloat(importoInput.replace(/\./g, "").replace(",", ".")) || 0;
            
            if (importoSpesa > 0) {
                totaleSpeseExtra += importoSpesa;
                speseExtraHTML += `<tr><td style="padding: 4px 0; padding-left: 10px; font-size: 0.9rem; color: #555;">- ${nomeSpesa}</td><td style="text-align: right; font-size: 0.9rem;">${fmt.format(importoSpesa)}</td></tr>`;
            }
        }

        // FASE 5: TASSA ARCHIVIO
        const scaglione = PUB.find(x => totalePrezzo <= x.max) || PUB[PUB.length - 1];
        const colonna = haPrimaCasa ? "70%" : "100%"; 
        const onorarioRepertorio = scaglione.h[colonna] || 0;
        
        const tassaArchivioNuda = Math.round(onorarioRepertorio * 0.10 * 100) / 100;
        const cassaNaz = Math.round(onorarioRepertorio * scaglione.c * 100) / 100;
        const consiglio = Math.round(onorarioRepertorio * 0.04 * 100) / 100;
        const fondoGar = Math.round(onorarioRepertorio * 0.002 * 100) / 100;
        const assicurazione = Math.round(onorarioRepertorio * 0.06 * 100) / 100;

        const baseIvaContributi = cassaNaz + consiglio + fondoGar + assicurazione;
        const ivaContributi = Math.round(baseIvaContributi * 0.22 * 100) / 100;
        const totaleContributi = tassaArchivioNuda + baseIvaContributi + ivaContributi;

        const totaleImposteFisse = impostaRegistro + impostaIpotecaria + impostaCatastale + impostaBollo + tassaTrascrizione + totaleSpeseExtra + totaleContributi;

        document.getElementById('risultatoPreventivo').innerHTML = `
            <h3>Riepilogo Preventivo</h3>
            <h4 style="margin-top: 0; color: #2c3e50; font-size: 1.1rem;">Prezzo dichiarato in atto: ${fmt.format(totalePrezzo)}</h4>
            
            <div style="background: #fafafa; padding: 10px; border: 1px solid #ddd; margin-bottom: 15px;">
                ${riepilogoHTML}
            </div>

            <table style="width: 100%; text-align: left; border-collapse: collapse; margin-bottom: 15px; font-size: 0.95rem;">
                <tr style="border-bottom: 2px solid #333;"><th>Voce</th><th style="text-align: right;">Importo</th></tr>
                <tr><td style="padding: 5px 0;">Imposta di Registro</td><td style="text-align: right; font-weight: bold;">${fmt.format(impostaRegistro)}</td></tr>
                <tr><td style="padding: 5px 0;">Imposta Ipotecaria</td><td style="text-align: right;">${fmt.format(impostaIpotecaria)}</td></tr>
                <tr><td style="padding: 5px 0;">Imposta Catastale</td><td style="text-align: right;">${fmt.format(impostaCatastale)}</td></tr>
                <tr><td style="padding: 5px 0;">Imposta di Bollo</td><td style="text-align: right;">${fmt.format(impostaBollo)}</td></tr>
                <tr><td style="padding: 5px 0;">Tassa di Trascrizione</td><td style="text-align: right;">${fmt.format(tassaTrascrizione)}</td></tr>
                
                ${speseExtraHTML}
                
                <tr style="border-top: 2px solid #ccc; background-color: #f9f9f9;">
                    <td style="padding: 8px 5px; font-weight: bold; font-size: 1.05rem; color: #2c3e50;">Tassa Archivio <span class="tooltip" title="Calcolata su Onorario Repertorio di ${fmt.format(onorarioRepertorio)} (Colonna ${colonna})">i</span></td>
                    <td style="text-align: right; font-weight: bold;">${fmt.format(totaleContributi)}</td>
                </tr>
            </table>

            <div style="background: #e8f4f8; padding: 15px; border-radius: 8px; border: 1px solid #3498db;">
                <label style="color: #2980b9;">Onorario Notarile (IVA inclusa) (€):</label>
                <input type="text" id="onorarioLibero" class="input-valuta" placeholder="es. 1.500,00" style="font-size: 1.2rem; font-weight: bold; color: #2c3e50;" oninput="formattaValuta(this); aggiornaTotale(${totaleImposteFisse})">
                <div style="font-size: 0.8rem; color: #7f8c8d; margin-top: 5px;">Inserire l'onorario concordato con lo studio, l'importo si intende già comprensivo di IVA.</div>
            </div>

            <div id="totaleFinaleBox" style="text-align: right; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-top: 15px;">
                <h2 id="totaleLabel" style="margin: 0; color: white; font-size: 1.4rem;">TOTALE: € 0,00</h2>
                <div id="dettaglioIva" style="font-size: 0.85rem; color: #bdc3c7; margin-top: 5px;">di cui IVA 22% scorporata: € 0,00</div>
            </div>
            
            <p style="font-size: 0.8rem; color: #e74c3c; border-top: 1px dashed #ccc; padding-top: 10px; margin-top: 15px;">
                <strong>NOTA BENE:</strong> Il prezzo dell'immobile di ${fmt.format(totalePrezzo)} ${totaleIvaVenditore > 0 ? 'e l\'IVA di ' + fmt.format(totaleIvaVenditore) : ''} non sono inclusi nel totale e vanno bonificati al venditore.
            </p>
        `;
        
        aggiornaTotale(totaleImposteFisse);
    }

    function aggiornaTotale(totaleTasse) {
        const inputOnorario = document.getElementById('onorarioLibero');
        let onorarioIvato = 0;
        if(inputOnorario && inputOnorario.value !== "") {
            onorarioIvato = parseFloat(inputOnorario.value.replace(/\./g, "").replace(",", ".")) || 0;
        }
        
        const totaleAssoluto = totaleTasse + onorarioIvato;
        const ivaScorporata = onorarioIvato - (onorarioIvato / 1.22);
        
        document.getElementById('totaleLabel').innerText = "TOTALE DA VERSARE: " + fmt.format(totaleAssoluto);
        document.getElementById('dettaglioIva').innerText = "di cui IVA 22% scorporata dall'onorario: " + fmt.format(ivaScorporata);
    }
</script>

</body>
</html>
