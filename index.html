<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Hub Preventivi - Studio Notarile de Luca di Roseto & Limosani</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90vh;
        }
        
        .hub-container { 
            max-width: 600px; 
            width: 100%;
            background: #fff; 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            text-align: center;
            margin-top: 5vh;
            box-sizing: border-box;
        }

        header { 
            border-bottom: 2px solid #ecf0f1; 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }
        
        h1 { font-size: 1.6rem; color: #2c3e50; margin: 0 0 10px 0; line-height: 1.3; }
        h2 { font-size: 1.1rem; color: #7f8c8d; margin: 0; font-weight: normal; }

        .istruzioni { font-size: 1.1rem; color: #555; margin-bottom: 20px; }

        .box-impiegato {
            background: #fff3e0;
            border: 1px solid #ffcc80;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }

        .box-impiegato label {
            font-weight: bold; font-size: 0.9rem; color: #d35400; display: block; margin-bottom: 5px;
        }

        .box-impiegato input {
            width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; font-size: 1rem; box-sizing: border-box; background: #fdfdfd; transition: all 0.3s;
        }
        
        .box-impiegato input:focus {
            border-color: #e67e22; outline: none; box-shadow: 0 0 5px rgba(230, 126, 34, 0.3);
        }

        .btn-nav {
            display: block; width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: all 0.3s ease; box-sizing: border-box; cursor: pointer;
        }

        .btn-cv { background: #3498db; color: white; border: 2px solid #2980b9; }
        .btn-cv:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(52, 152, 219, 0.3); }

        .btn-donazioni { background: #8e44ad; color: white; border: 2px solid #732d91; }
        .btn-donazioni:hover { background: #732d91; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(142, 68, 173, 0.3); }

        footer { margin-top: auto; padding-top: 30px; font-size: 0.85rem; color: #95a5a6; text-align: center; }
    </style>
</head>
<body>

    <div class="hub-container">
        <header>
            <h1>Studio Notarile Associato</h1>
            <h2>Massimo de Luca di Roseto & Angela Limosani</h2>
        </header>

        <div class="box-impiegato">
            <label>Eseguito da:</label>
            <input type="text" id="nomeImpiegatoGlobale" placeholder="Inserisci il tuo nome (es. Mario Rossi)" autocomplete="off" oninput="salvaNome(this.value)">
        </div>

        <div class="istruzioni">
            Seleziona il modulo per generare il preventivo:
        </div>

        <a href="CV.html" class="btn-nav btn-cv">Compravendite e Mutui</a>
        <a href="Donazioni.html" class="btn-nav btn-donazioni">Donazioni</a>
    </div>

    <footer>
        By Pasquale Barone &copy; 2026
    </footer>

    <script>
        // Al caricamento della pagina, cerca se c'è già un nome sul "post-it"
        window.onload = function() {
            const nomeSalvato = localStorage.getItem('nomeImpiegatoPWA');
            if (nomeSalvato) {
                document.getElementById('nomeImpiegatoGlobale').value = nomeSalvato;
            }
        };

        // Ogni volta che digiti un carattere, aggiorna il "post-it"
        function salvaNome(nome) {
            localStorage.setItem('nomeImpiegatoPWA', nome);
        }
    </script>
</body>
</html>
