<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Preventivatore Notarile PWA</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: #333; }
        .app-container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #2c3e50; margin: 0; }
        h2 { font-size: 1rem; color: #7f8c8d; margin: 5px 0 0 0; }
        h3 { color: #2980b9; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 20px;}
        
        label { font-weight: bold; font-size: 0.9rem; color: #2c3e50; display: block; margin-top: 10px; }
        select, input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #bdc3c7; border-radius: 6px; font-size: 1rem; box-sizing: border-box; background: #fdfdfd; transition: all 0.3s; }
        select:focus, input[type="text"]:focus, input[type="number"]:focus, input[type="date"]:focus { border-color: #3498db; outline: none; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        input:disabled { background: #e0e0e0; color: #7f8c8d; cursor: not-allowed; border-color: #bdc3c7; }
        
        button { background: #3498db; color: white; border: none; padding: 12px 15px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 15px; }
        button:hover { background: #2980b9; }
        button.secondary { background: #95a5a6; }
        button.secondary:hover { background: #7f8c8d; }
        button.danger { background: #e74c3c; width: auto; padding: 5px 10px; font-size: 0.8rem; float: right; margin-top: 0; }
        
        .toggle-container { background: #e8f4f8; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #d6eaf8; transition: opacity 0.3s; }
        .toggle-container label { display: inline; margin-left: 10px; font-size: 1rem; cursor: pointer; }
        
        .tooltip { cursor: help; background: #f39c12; color: #fff; padding: 2px 6px; border-radius: 50%; font-size: 0.8rem; margin-left: 5px; }
        .blocco-immobile { border: 2px solid #ecf0f1; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 8px; }
        .blocco-terreno { border: 2px solid #27ae60; padding: 15px; margin-bottom: 15px; background: #eafaf1; border-radius: 8px; }
        .blocco-mutuo { border: 2px solid #8e44ad; padding: 15px; margin-top: 15px; background: #f4ecf7; border-radius: 8px; display: none; }
        
        .box-guida { background: #e3f2fd; border-left: 4px solid #3498db; padding: 10px; margin-top: 15px; margin-bottom: 5px; font-size: 0.85rem; color: #2c3e50; border-radius: 0 6px 6px 0; line-height: 1.4; }
        .box-guida strong { color: #2980b9; }
        
        .box-avveramento { background: #fff9c4; border: 2px dashed #f39c12; padding: 15px; margin-top: 20px; border-radius: 8px; font-size: 0.9rem; color: #d35400; }
        .box-avveramento h4 { margin-top: 0; margin-bottom: 10px; color: #e67e22; }

        .btn-home { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #7f8c8d; font-size: 0.9rem; font-weight: bold; background: #e8f4f8; padding: 5px 15px; border-radius: 20px; transition: all 0.3s; }
        .btn-home:hover { background: #d6eaf8; color: #2c3e50; }

        .wizard-step { display: none; }
        #step1 { display: block; }
        .flex-buttons { display: flex; gap: 10px; }

        .linea-stampa-vuota { display: none; width: 150px; border-bottom: 2px solid #000; margin-left: 10px; }
        .linea-onorario-vuota { display: none; }
        
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .app-container { box-shadow: none; border: none; padding: 0; }
            button, .btn-home { display: none !important; }
            input[type="text"], input[type="date"], input[type="number"] { border: none !important; background: transparent !important; padding: 0 !important; width: auto !important; min-width: 80px; }
            .box-guida, .tooltip, .avviso-rosso { display: none !important; }
